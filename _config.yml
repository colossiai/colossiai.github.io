remote_theme: "mmistakes/minimal-mistakes@4.26.2"

title: Explore the world
subtitle: Interesting notes
description: Interesting notes
url: "https://colossiai.github.io"

# Site Author
author:
  name: "Colossiai"

# Reading
words_per_minute: 200

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

# Skin
minimal_mistakes_skin: "air" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Pagination
paginate: 10
paginate_path: /page:num/

# Include _pages
include:
  - _pages

# Category archive
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      show_date: true
      read_time: true
      share: true
      related: true
      toc: true
      toc_sticky: true
      sidebar:
        nav: "categories"
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      sidebar:
        nav: "categories"
